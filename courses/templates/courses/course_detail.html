{% extends "base.html" %}

{% block content %}
<h2>{{ course.title }}</h2>
<p>{{ course.description }}</p>

<h3>Уроки цього курсу:</h3>
<ul>
  {% for lesson in course.lessons.all %}
    <li>
      <a href="{% url 'lesson_detail' lesson.id %}">{{ lesson.title }}</a>
    </li>
  {% empty %}
    <li>У цьому курсі ще немає уроків.</li>
  {% endfor %}
</ul>
{% endblock %}
