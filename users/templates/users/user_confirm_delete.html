{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <h2>Підтвердження видалення акаунту</h2>
    
    <!-- Змінна 'object' або 'user' містить користувача, якого видаляють -->
    <p>Ви впевнені, що хочете видалити користувача <strong>{{ object.email }}</strong>?</p>
    <p class="text-danger">Цю дію не можна буде скасувати!</p>
    
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Так, видалити назавжди</button>
        <a href="{% url 'profile' %}" class="btn btn-secondary">Скасувати</a>
    </form>
</div>
{% endblock %}
